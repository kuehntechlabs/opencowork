name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            build_cmd: npm run package:mac
          - os: windows-latest
            platform: win32
            arch: x64
            build_cmd: npm run package:win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        env:
          BUILD_PLATFORM: ${{ matrix.platform }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: ${{ matrix.build_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename artifacts for release
        run: |
          cd artifacts
          for f in *.dmg; do [ -f "$f" ] && mv "$f" "OpenCowork-macOS.dmg"; done
          for f in *.zip; do [ -f "$f" ] && mv "$f" "OpenCowork-macOS.zip"; done
          for f in *.exe; do [ -f "$f" ] && mv "$f" "OpenCowork-Windows-Setup.exe"; done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
