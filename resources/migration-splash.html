<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
<title>Preparing OpenCowork…</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0f0f0f;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-user-select: none;
    overflow: hidden;
    border-radius: 10px;
  }
  body { display: flex; flex-direction: column; justify-content: center; padding: 24px 28px; }
  .title { font-size: 14px; font-weight: 500; margin: 0 0 4px; }
  .subtitle { font-size: 12px; color: #888; margin: 0 0 18px; }
  .bar { width: 100%; height: 6px; background: #2a2a2a; border-radius: 3px; overflow: hidden; }
  .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4d9fff, #6e7bff);
    transition: width 250ms ease-out;
  }
  .pct { font-size: 11px; color: #888; margin-top: 8px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <p class="title">Migrating opencode database…</p>
  <p class="subtitle">First-run setup — this only happens once.</p>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <p class="pct" id="pct">0%</p>
  <script>
    const fill = document.getElementById("fill");
    const pct = document.getElementById("pct");
    if (window.api && typeof window.api.onOpencodeMigrationProgress === "function") {
      window.api.onOpencodeMigrationProgress((p) => {
        if (p && p.type === "InProgress") {
          const v = Math.max(0, Math.min(100, p.value || 0));
          fill.style.width = v + "%";
          pct.textContent = v + "%";
        } else if (p && p.type === "Done") {
          fill.style.width = "100%";
          pct.textContent = "100%";
        }
      });
    }
  </script>
</body>
</html>
